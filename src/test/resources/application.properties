spring.datasource.url=jdbc:h2:mem:lessons_plan_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.auth.public-base-url=http://localhost:8080
app.auth.frontend-success-url=http://localhost:3000/auth/callback
app.auth.frontend-error-url=http://localhost:3000/auth/error
app.auth.magic-link-ttl=15m
app.auth.jwt-ttl=8h
app.auth.jwt-secret=test-secret-test-secret-test-secret
