spring.application.name=lessons-plan

spring.datasource.url=jdbc:postgresql://localhost:5332/lesson_plan
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=create-drop 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

app.auth.public-base-url=${APP_AUTH_PUBLIC_BASE_URL:http://localhost:8080}
app.auth.frontend-success-url=${APP_AUTH_FRONTEND_SUCCESS_URL:http://localhost:3000/auth/callback}
app.auth.frontend-error-url=${APP_AUTH_FRONTEND_ERROR_URL:http://localhost:3000/auth/error}
app.auth.mail-from=${APP_AUTH_MAIL_FROM:no-reply@lessonsplan.local}
app.auth.magic-link-ttl=${APP_AUTH_MAGIC_LINK_TTL:15m}
app.auth.jwt-ttl=${APP_AUTH_JWT_TTL:8h}
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:change-me-change-me-change-me-change-me}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
