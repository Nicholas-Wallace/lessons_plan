<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Plano de Aula</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <div class="card auth-card">
            <h2>Registrar</h2>
            
            <div id="message" class="message" style="display: none;"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required minlength="6">
                    <small>Mínimo de 6 caracteres</small>
                </div>

                <button type="submit" class="btn btn-primary full-width">Registrar</button>
            </form>

            <p class="auth-link">
                Já tem conta? <a href="login.html">Faça login aqui</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/v1/registration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password
                    })
                });

                if (response.ok) {
                    showMessage('Registro realizado com sucesso! Redirecionando para login...', 'success');
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    let errorMessage = 'Erro ao registrar';

                    try {
                        const error = await response.json();
                        errorMessage = error.message || errorMessage;
                    } catch (_) {
                        // fallback when response is not JSON
                    }

                    showMessage(errorMessage, 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão: ' + error.message, 'error');
            }
        });

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
