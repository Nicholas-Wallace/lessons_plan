# Copy this file to application-local.properties and replace the placeholder values.
# Run the project with the local profile:
# .\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=local"

spring.datasource.url=jdbc:postgresql://localhost:5332/lesson_plan
spring.datasource.username=user
spring.datasource.password=password

app.auth.public-base-url=http://localhost:8080
app.auth.frontend-success-url=http://localhost:3000/auth/callback
app.auth.frontend-error-url=http://localhost:3000/auth/error
app.auth.magic-link-ttl=15m
app.auth.jwt-ttl=8h
app.auth.jwt-secret=change-this-local-secret-before-running

app.auth.mail-from=your-email@gmail.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=replace-with-your-google-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
